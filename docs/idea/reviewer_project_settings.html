<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem; min-height: 540px;">
  <h2 class="sr-only">專案設定頁,左側為專案清單,右側為選定專案的詳細設定:來源類型、路徑、GitLab 設定與工程師對應</h2>

  <div style="display: flex; gap: 1px; background: var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); min-height: 520px;">

    <div style="width: 210px; background: var(--color-background-primary); padding: 14px 12px; flex-shrink: 0;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
        <span style="font-size: 13px; font-weight: 500; color: var(--color-text-secondary);">專案</span>
        <button style="font-size:11px; padding:4px 9px; border:0.5px solid var(--color-border-info); color:var(--color-text-info);"><i class="ti ti-plus" aria-hidden="true" style="margin-right:3px;"></i>新增</button>
      </div>

      <div style="display:flex; flex-direction:column; gap:3px;">
        <div style="display:flex; align-items:center; gap:8px; padding: 9px 10px; border-radius: var(--border-radius-md); background: var(--color-background-info);">
          <i class="ti ti-brand-gitlab" aria-hidden="true" style="color:var(--color-text-info); font-size:15px;"></i>
          <span style="font-size: 13px; color: var(--color-text-info); font-weight:500;">game-backend</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px; padding: 9px 10px; border-radius: var(--border-radius-md);">
          <i class="ti ti-brand-gitlab" aria-hidden="true" style="color:var(--color-text-tertiary); font-size:15px;"></i>
          <span style="font-size: 13px;">payment-service</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px; padding: 9px 10px; border-radius: var(--border-radius-md);">
          <i class="ti ti-folder" aria-hidden="true" style="color:var(--color-text-tertiary); font-size:15px;"></i>
          <span style="font-size: 13px;">infra-tools</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px; padding: 9px 10px; border-radius: var(--border-radius-md);">
          <i class="ti ti-brand-gitlab" aria-hidden="true" style="color:var(--color-text-tertiary); font-size:15px;"></i>
          <span style="font-size: 13px;">admin-portal</span>
        </div>
      </div>
    </div>

    <div style="flex: 1; background: var(--color-background-primary); padding: 18px 24px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
        <div style="display:flex; align-items:center; gap:9px;">
          <i class="ti ti-brand-gitlab" aria-hidden="true" style="color:var(--color-text-info); font-size:18px;"></i>
          <h1 style="font-size: 18px; margin: 0;">game-backend</h1>
        </div>
        <button style="font-size:12px; padding:5px 10px; color:var(--color-text-danger); border:0.5px solid var(--color-border-tertiary);"><i class="ti ti-trash" aria-hidden="true" style="margin-right:4px;"></i>移除</button>
      </div>

      <div style="margin-bottom:18px;">
        <label style="font-size:12px; color:var(--color-text-secondary); display:block; margin-bottom:6px;">來源類型</label>
        <div style="display:flex; gap:8px;">
          <span style="font-size:12px; padding:6px 14px; border-radius:var(--border-radius-md); background:var(--color-background-info); color:var(--color-text-info); font-weight:500; display:flex; align-items:center; gap:5px;"><i class="ti ti-brand-gitlab" aria-hidden="true"></i> GitLab</span>
          <span style="font-size:12px; padding:6px 14px; border-radius:var(--border-radius-md); background:var(--color-background-secondary); color:var(--color-text-tertiary); display:flex; align-items:center; gap:5px;"><i class="ti ti-folder" aria-hidden="true"></i> 本地</span>
        </div>
      </div>

      <div style="margin-bottom:18px;">
        <label style="font-size:12px; color:var(--color-text-secondary); display:block; margin-bottom:6px;">GitLab Project ID</label>
        <div style="font-size:13px; padding:8px 12px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-tertiary); color:var(--color-text-primary);">123</div>
      </div>

      <div style="margin-bottom:18px;">
        <label style="font-size:12px; color:var(--color-text-secondary); display:block; margin-bottom:6px;">本地路徑 <span style="color:var(--color-text-tertiary);">(供 skill 讀取程式碼)</span></label>
        <div style="font-size:13px; padding:8px 12px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-tertiary); color:var(--color-text-secondary); font-family:monospace;">/workspace/game-backend</div>
      </div>

      <div style="margin-bottom:8px;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
          <label style="font-size:12px; color:var(--color-text-secondary);">工程師對應 <span style="color:var(--color-text-tertiary);">(GitLab username → 顯示名)</span></label>
          <button style="font-size:11px; padding:3px 8px; color:var(--color-text-info);"><i class="ti ti-plus" aria-hidden="true"></i></button>
        </div>
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="display:flex; align-items:center; gap:8px; font-size:13px; padding:7px 10px; background:var(--color-background-secondary); border-radius:var(--border-radius-md);">
            <span style="width:22px;height:22px;border-radius:50%;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--color-text-info);">A</span>
            <span style="font-family:monospace; color:var(--color-text-tertiary); font-size:12px;">alice_w</span>
            <i class="ti ti-arrow-right" aria-hidden="true" style="color:var(--color-text-tertiary); font-size:12px;"></i>
            <span>Alice</span>
          </div>
          <div style="display:flex; align-items:center; gap:8px; font-size:13px; padding:7px 10px; background:var(--color-background-secondary); border-radius:var(--border-radius-md);">
            <span style="width:22px;height:22px;border-radius:50%;background:var(--color-background-tertiary);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--color-text-secondary);">B</span>
            <span style="font-family:monospace; color:var(--color-text-tertiary); font-size:12px;">bob_chen</span>
            <i class="ti ti-arrow-right" aria-hidden="true" style="color:var(--color-text-tertiary); font-size:12px;"></i>
            <span>Bob</span>
          </div>
        </div>
      </div>

      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:22px; padding-top:16px; border-top:0.5px solid var(--color-border-tertiary);">
        <button style="font-size:13px; padding:7px 16px; color:var(--color-text-tertiary);">取消</button>
        <button style="font-size:13px; padding:7px 16px; background:var(--color-text-info); color:white; border:none;">儲存</button>
      </div>
    </div>
  </div>
</div>
